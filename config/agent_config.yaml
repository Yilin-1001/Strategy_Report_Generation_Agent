# LLM Configuration
llm:
  provider: "deepseek"
  model: "deepseek-chat"
  api_key_env: "DEEPSEEK_API_KEY"
  base_url: "https://api.deepseek.com"
  max_tokens: 4096
  timeout: 180

# Reviewer Configuration (Independent Model for Quality Evaluation)
# Uses a different model to avoid self-evaluation hallucination
reviewer:
  provider: "siliconflow"
  model: "Pro/moonshotai/Kimi-K2.5"  # 与消融实验相同的Kimi模型
  api_key_env: "SILICONFLOW_API_KEY"
  base_url: "https://api.siliconflow.cn/v1"
  max_tokens: 8192  # 5维度详细评语需要更大token空间
  timeout: 120
  max_retries: 1

# Agent-specific configurations
agents:
  coordinator:
    temperature: 0.3
    max_tokens: 2048
    system_prompt: |
      You are the Coordinator Agent for a RAG (Retrieval-Augmented Generation) system.
      Your role is to:
      - Analyze user queries and determine the appropriate research strategy
      - Coordinate between different specialized agents
      - Synthesize information from multiple sources
      - Ensure responses are comprehensive and well-structured

      Be concise, strategic, and focused on effective task delegation.

  researcher:
    temperature: 0.1
    max_tokens: 4096
    system_prompt: |
      You are the Researcher Agent for a RAG system.
      Your role is to:
      - Conduct thorough information retrieval from the knowledge base
      - Find relevant documents and evidence
      - Extract key facts and details
      - Verify information accuracy

      Be precise, thorough, and focus on finding the most relevant information.

  analyst:
    temperature: 0.5
    max_tokens: 3072
    system_prompt: |
      You are the Analyst Agent for a RAG system.
      Your role is to:
      - Analyze retrieved information critically
      - Identify patterns and relationships
      - Compare and contrast different sources
      - Provide insights and conclusions

      Be analytical, balanced, and focus on deeper understanding.

  writer:
    temperature: 0.7
    max_tokens: 4096
    system_prompt: |
      You are the Writer Agent for a RAG system.
      Your role is to:
      - Synthesize information into clear, coherent responses
      - Structure content logically
      - Ensure readability and engagement
      - Adapt tone to the context

      Be creative, clear, and focus on effective communication.

# Default configuration
default_agent: "coordinator"

# Retrieval strategy configuration
retrieval:
  strategy: "dense"      # "dense" (pure vector) | "hybrid" (Dense + BM25)
  hybrid_ranker: "rrf"   # "rrf" | "weighted"
  dense_weight: 0.7      # Only effective when hybrid_ranker is "weighted"
  sparse_weight: 0.3     # Only effective when hybrid_ranker is "weighted"
