# Milvus vector database configuration
milvus:
  # Connection settings
  host: "localhost"
  port: 19530
  alias: "default"

  # Collection settings
  collection:
    name: "enterprise_docs"
    description: "Enterprise document vector database"
    dimension: 1024  # BGE-M3 dimension

  # Index settings
  index:
    type: "HNSW"
    metric_type: "IP"  # Inner Product
    params:
      M: 16
      efConstruction: 256

  # Search settings
  search:
    top_k: 50  # Initial retrieval count
    ef: 128    # Search depth

# Embedding model configuration
embedding:
  # Choose mode: "local" or "api"
  mode: "api"  # Use API server (recommended for faster startup)

  # Local model settings (only used when mode: "local")
  model_name: "BAAI/bge-m3"
  device: "cuda"  # Force GPU acceleration
  batch_size: 32
  max_length: 8192
  normalize_embeddings: true
  cache_dir: "./data/models"

  # API client settings (only used when mode: "api")

  # API provider: "siliconflow", "openai", or "local"
  api_provider: "siliconflow"  # 使用硅基流动

  # API base URL (optional - will use provider default if not specified)
  # api_base_url: "https://api.siliconflow.cn/v1"

  # API model name
  api_model: "BAAI/bge-m3"  # 硅基流动支持的模型

  # API key (or set SILICONFLOW_API_KEY environment variable)
  # 在这里设置你的API密钥，或者通过环境变量 SILICONFLOW_API_KEY 设置
  api_key: "sk-galtgnlesfoydjzetapqerkapxzqbtdnlnyulgibiqymvqik"  # ← 在这里填入你的硅基流动API密钥

  # Request timeout in seconds
  api_timeout: 30
